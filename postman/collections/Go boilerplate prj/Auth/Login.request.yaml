$kind: http-request
url: "{{base_url}}/auth/login"
method: POST
body:
  type: json
  content: |-
    {
        "email": "sa@test.com",
        "password": "1234"
    }
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: "let jsonData = pm.response.json();\r

      pm.environment.set(\"token\", jsonData.token);"
    language: text/javascript
order: 2000
