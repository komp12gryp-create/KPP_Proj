$kind: http-request
url: "{{base_url}}/auth/change-pwd"
method: POST
headers:
  access-control-request-headers: authorization,content-type
  access-control-request-method: GET
  origin: http://192.168.0.111:8100
body:
  type: json
  content: "{\r

    \    \"oldPassword\": \"1234\",\r

    \    \"newPassword\": \"12345678\"\r

    }"
scripts:
  - type: afterResponse
    code: pm.environment.set("token", null);
    language: text/javascript
order: 4000
